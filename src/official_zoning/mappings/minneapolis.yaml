# Minneapolis 2040 Plan — Primary Land Use (Future Land Use Map)
# Source: opendata.minneapolismn.gov / Planning Primary Zoning dataset
# Reference: Mpls 2040 Comprehensive Plan — Land Use chapter
# Note: this is the 2040 Plan land use designation (planning intent), NOT
# Chapter 530 zoning codes. The City publishes this as "Primary Zoning" on
# its open data portal. For CS2 replication it represents how each parcel
# IS PLANNED to develop, which is more useful than the legacy zoning code.
city: minneapolis
source_url: https://opendata.minneapolismn.gov/datasets/planning-primary-zoning
source_field: Land_Use_C
crs_in: EPSG:3857
last_validated: 2026-05-25
mappings:
  # Urban Neighborhood — tiered residential density (UN1 = lowest, UN3 = highest)
  UN1:  res_low_house          # Urban Neighborhood 1 — primarily single-family
  UN2:  res_row                # Urban Neighborhood 2 — small multifamily allowed
  UN3:  res_med                # Urban Neighborhood 3 — moderate multifamily

  # Residence + adjacent uses (transitions)
  RM1:  res_mixed              # Residence Goods and Services
  RM2:  res_mixed              # Residence Office and Services
  RM3:  res_mixed              # Residence and Institutional

  # Corridor / community / destination mixed use (ascending density+activity)
  CM1:  res_mixed              # Neighborhood Mixed Use
  CM2:  com_low                # Corridor Mixed Use
  CM3:  com_low                # Community Mixed Use
  CM4:  com_high               # Destination Mixed Use

  # Downtown
  DT1:  com_high               # Downtown Center
  DT2:  com_high               # Downtown Destination

  # Production (light/medium industrial intent)
  PR1:  industrial             # Production Mixed Use
  PR2:  industrial             # Production and Processing

  # Transportation / right-of-way / transit hubs
  TR1:  prk_surface            # Transportation

unmapped: skip
