# Minneapolis Zoning Code mapping — Mpls Municipal Code Chapter 530
# Source: opendata.minneapolismn.gov Zoning Districts dataset
# Reference: https://library.municode.com/mn/minneapolis/codes/code_of_ordinances
city: minneapolis
source_url: https://opendata.minneapolismn.gov/datasets/zoning
source_field: ZONE_CODE
crs_in: EPSG:26915
last_validated: 2026-05-24
mappings:
  # Residential districts (R1–R6)
  R1:   res_low_house     # Single-family — large lot
  R1A:  res_low_house     # Single-family — standard lot
  R2:   res_low_house     # Two-family
  R2B:  res_row           # Two-family + townhouse
  R3:   res_med           # Multi-family low density
  R4:   res_med           # Multi-family medium density
  R5:   res_high          # Multi-family medium-high
  R6:   res_high          # Multi-family high density

  # Office Residence (OR1–OR3)
  OR1:  res_mixed
  OR2:  res_mixed
  OR3:  office_low

  # Business districts (B1–B4)
  B1:   com_low           # Neighborhood Business
  B2:   com_low           # Neighborhood Corridor
  B3:   com_high          # Community Business
  B4:   com_high          # Downtown Business
  B4-1: com_high          # Downtown — subdistrict 1
  B4-2: com_high
  B4C:  com_high          # Downtown core

  # Commercial corridor
  C1:   com_low
  C2:   com_low
  C3A:  com_high

  # Industrial (I1–I3)
  I1:   industrial        # Light industrial
  I2:   industrial        # Medium industrial
  I3:   industrial        # General industrial

unmapped: skip
